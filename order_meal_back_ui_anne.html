<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點餐系統 - 後台管理</title>
<meta name="description" content="團體訂餐後台管理系統，支援新增、查詢、修改、刪除訂單">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252542;--surface3:#2f2f50;
--accent:#6c5ce7;--accent2:#a29bfe;--accent3:#fd79a8;
--green:#00b894;--red:#e17055;--yellow:#fdcb6e;--cyan:#00cec9;
--text:#e8e8f0;--text2:#a0a0c0;--text3:#6c6c8a;
--border:rgba(108,92,231,.2);--glass:rgba(26,26,46,.85);
--radius:12px;--shadow:0 8px 32px rgba(0,0,0,.3);
}
body{font-family:'Noto Sans TC','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(108,92,231,.08),transparent 50%),radial-gradient(circle at 80% 80%,rgba(253,121,168,.06),transparent 50%);pointer-events:none;z-index:0}

/* Header */
.header{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:var(--glass);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;gap:12px;align-items:center}
.header .badge{background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600}

/* Tab Bar */
.tab-bar{display:flex;gap:4px;padding:16px 32px 0;position:relative;z-index:1}
.tab{padding:10px 24px;border-radius:var(--radius) var(--radius) 0 0;background:var(--surface);color:var(--text2);cursor:pointer;font-size:14px;font-weight:500;border:1px solid transparent;border-bottom:none;transition:all .3s}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{background:var(--surface2);color:var(--accent2);border-color:var(--border)}

/* Main */
.main{padding:0 32px 32px;position:relative;z-index:1}
.panel{display:none;background:var(--surface2);border-radius:0 var(--radius) var(--radius) var(--radius);border:1px solid var(--border);padding:24px;animation:fadeIn .3s}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Toolbar */
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-box{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0 14px;flex:1;min-width:200px;max-width:400px;transition:border-color .3s}
.search-box:focus-within{border-color:var(--accent)}
.search-box input{background:none;border:none;color:var(--text);padding:10px 8px;width:100%;outline:none;font-size:14px}
.search-box svg{width:18px;height:18px;color:var(--text3)}
select.filter-select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:14px;cursor:pointer;outline:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .25s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,.4)}
.btn-success{background:linear-gradient(135deg,var(--green),#55efc4);color:#1a1a2e}
.btn-danger{background:linear-gradient(135deg,var(--red),#fab1a0);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}

/* Table */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead{background:var(--surface)}
th{padding:12px 16px;text-align:left;font-weight:600;color:var(--accent2);font-size:13px;white-space:nowrap;border-bottom:2px solid var(--border)}
td{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap}
tbody tr{transition:background .2s}
tbody tr:hover{background:rgba(108,92,231,.06)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-meal{background:rgba(108,92,231,.15);color:var(--accent2)}
.tag-drink{background:rgba(0,206,201,.15);color:var(--cyan)}
.tag-veg{background:rgba(0,184,148,.15);color:var(--green)}
.action-group{display:flex;gap:6px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card:nth-child(1)::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.stat-card:nth-child(2)::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.stat-card:nth-child(3)::before{background:linear-gradient(90deg,var(--accent3),var(--yellow))}
.stat-card:nth-child(4)::before{background:linear-gradient(90deg,var(--cyan),var(--green))}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.stat-value{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface2);border:1px solid var(--border);border-radius:16px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);animation:modalIn .3s}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:18px;font-weight:700;color:var(--accent2)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .2s}
.modal-close:hover{background:var(--surface);color:var(--text)}
.modal-body{padding:24px}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:13px;font-weight:600;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .3s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:60px}
.radio-group{display:flex;flex-wrap:wrap;gap:8px}
.radio-card{position:relative}
.radio-card input{display:none}
.radio-card span{display:block;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;transition:all .25s}
.radio-card input:checked+span{background:rgba(108,92,231,.15);border-color:var(--accent);color:var(--accent2)}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:500;z-index:300;transform:translateY(100px);opacity:0;transition:all .4s}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:linear-gradient(135deg,var(--green),#55efc4);color:#1a1a2e}
.toast-error{background:linear-gradient(135deg,var(--red),#fab1a0)}

/* Responsive */
@media(max-width:768px){
  .header{padding:12px 16px}.main{padding:0 16px 16px}.tab-bar{padding:12px 16px 0}
  .form-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}
  .toolbar{flex-direction:column}.search-box{max-width:100%}
}

/* Date Setup */
.date-setup{background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(253,121,168,.05));border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.date-setup h3{font-size:15px;color:var(--accent2);margin-bottom:12px}
.date-setup .inline-form{display:flex;gap:12px;flex-wrap:wrap;align-items:end}

/* Pagination */
.pagination{display:flex;gap:6px;justify-content:center;margin-top:16px;align-items:center}
.pagination button{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;transition:all .2s}
.pagination button.active,.pagination button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-info{font-size:13px;color:var(--text3);margin:0 8px}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.3}
.empty-state p{font-size:15px}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div style="display:flex;align-items:center;gap:16px">
    <h1>🍱 點餐系統後台管理</h1>
    <span class="badge">Admin</span>
  </div>
  <div class="header-right">
    <span style="font-size:13px;color:var(--text3)" id="currentDate"></span>
    <span style="font-size:13px;color:var(--accent2);font-weight:600">Anne</span>
  </div>
</header>

<!-- Tabs -->
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('orders')" id="tab-orders">📋 訂單管理</div>
  <div class="tab" onclick="switchTab('menu')" id="tab-menu">🍽️ 菜單設定</div>
  <div class="tab" onclick="switchTab('stats')" id="tab-stats">📊 統計總覽</div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Orders Panel -->
  <div class="panel active" id="panel-orders">
    <!-- Date Setup -->
    <div class="date-setup">
      <h3>📅 訂餐日期設定</h3>
      <div class="inline-form">
        <div class="form-group">
          <label>訂餐日期</label>
          <input type="date" id="orderDate" style="width:180px">
        </div>
        <div class="form-group">
          <label>星期</label>
          <input type="text" id="orderDay" readonly style="width:80px;background:var(--surface3)">
        </div>
        <div class="form-group">
          <label>截止時間</label>
          <input type="time" id="cutoffTime" value="10:00" style="width:140px">
        </div>
        <button class="btn btn-primary" onclick="applyDateSetting()">套用設定</button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="搜尋員工姓名..." id="searchInput" oninput="filterOrders()">
      </div>
      <select class="filter-select" id="filterMeal" onchange="filterOrders()">
        <option value="">全部主餐</option>
        <option value="油蔥舒肥雞">油蔥舒肥雞</option>
        <option value="蒲燒魚">爺爺蒲燒魚</option>
        <option value="椒麻豬排">招牌椒麻豬排</option>
        <option value="椒鹽炸雞">原味椒鹽炸雞</option>
        <option value="素食">素食</option>
      </select>
      <select class="filter-select" id="filterDrink" onchange="filterOrders()">
        <option value="">全部飲料</option>
        <option value="桂香青檸粉粿">桂香青檸粉粿</option>
        <option value="珍珠大正紅茶拿鐵">珍珠大正紅茶拿鐵</option>
        <option value="原片初露青茶">原片初露青茶</option>
      </select>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="exportCSV()">📥 匯出</button>
      <button class="btn btn-primary" onclick="openModal('add')">➕ 新增訂單</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>序號</th>
            <th>員工姓名</th>
            <th>出席</th>
            <th>主餐選擇</th>
            <th>飲料選擇</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Menu Panel -->
  <div class="panel" id="panel-menu">
    <div class="toolbar">
      <h3 style="font-size:16px;color:var(--accent2)">主餐選項管理</h3>
      <div style="flex:1"></div>
      <button class="btn btn-primary btn-sm" onclick="openMenuModal('meal')">➕ 新增主餐</button>
    </div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr><th>編號</th><th>餐點名稱</th><th>類型</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="mealMenuBody"></tbody>
      </table>
    </div>
    <div class="toolbar">
      <h3 style="font-size:16px;color:var(--cyan)">飲料選項管理</h3>
      <div style="flex:1"></div>
      <button class="btn btn-primary btn-sm" onclick="openMenuModal('drink')">➕ 新增飲料</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>編號</th><th>飲料名稱</th><th>甜度</th><th>冰塊</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="drinkMenuBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Stats Panel -->
  <div class="panel" id="panel-stats">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">總訂單數</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="stat-card"><div class="stat-label">已出席</div><div class="stat-value" id="statAttend">0</div></div>
      <div class="stat-card"><div class="stat-label">主餐已選</div><div class="stat-value" id="statMeal">0</div></div>
      <div class="stat-card"><div class="stat-label">飲料已選</div><div class="stat-value" id="statDrink">0</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="stat-card"><h4 style="color:var(--accent2);margin-bottom:12px">🍱 主餐統計</h4><div id="mealStats"></div></div>
      <div class="stat-card"><h4 style="color:var(--cyan);margin-bottom:12px">🥤 飲料統計</h4><div id="drinkStats"></div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">新增訂單</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="orderForm" onsubmit="return saveOrder(event)">
        <input type="hidden" id="editId">
        <div class="form-grid">
          <div class="form-group">
            <label>員工姓名 *</label>
            <input type="text" id="empName" required placeholder="請輸入姓名">
          </div>
          <div class="form-group">
            <label>出席狀態</label>
            <select id="empAttend"><option value="OK">OK - 出席</option><option value="">未確認</option></select>
          </div>
          <div class="form-group full">
            <label>主餐選擇（四選一）</label>
            <div class="radio-group" id="mealChoices"></div>
          </div>
          <div class="form-group full">
            <label>飲料選擇（三選一）</label>
            <div class="radio-group" id="drinkChoices"></div>
          </div>
          <div class="form-group full">
            <label>備註</label>
            <textarea id="empRemark" placeholder="選填，如特殊需求"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">儲存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteOverlay" onclick="if(event.target===this)document.getElementById('deleteOverlay').classList.remove('show')">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h2 style="color:var(--red)">⚠️ 確認刪除</h2><button class="modal-close" onclick="document.getElementById('deleteOverlay').classList.remove('show')">&times;</button></div>
    <div class="modal-body" style="text-align:center">
      <p style="margin-bottom:20px">確定要刪除 <strong id="deleteName"></strong> 的訂單嗎？</p>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-ghost" onclick="document.getElementById('deleteOverlay').classList.remove('show')">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">確認刪除</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// Data
let orders = [];
let nextId = 1;
let currentPage = 1;
const pageSize = 10;
let editingId = null;

const defaultMeals = [
  {id:1,name:'油蔥舒肥雞霸氣會議餐盒',type:'葷',active:true},
  {id:2,name:'爺爺蒲燒魚霸氣會議餐盒',type:'葷',active:true},
  {id:3,name:'招牌椒麻豬排霸氣會議餐盒',type:'葷',active:true},
  {id:4,name:'原味椒鹽炸雞霸氣會議餐盒',type:'葷',active:true},
  {id:5,name:'素食餐盒',type:'素',active:true}
];
const defaultDrinks = [
  {id:1,name:'桂香青檸粉粿',sugar:'無糖',ice:'微冰',active:true},
  {id:2,name:'珍珠大正紅茶拿鐵',sugar:'微糖',ice:'微冰',active:true},
  {id:3,name:'原片初露青茶',sugar:'無糖',ice:'微冰',active:true}
];

let meals = JSON.parse(localStorage.getItem('om_meals')) || [...defaultMeals];
let drinks = JSON.parse(localStorage.getItem('om_drinks')) || [...defaultDrinks];

// Init
function init(){
  document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('orderDate').value = today;
  updateDayOfWeek();
  
  const saved = localStorage.getItem('om_orders');
  if(saved){orders=JSON.parse(saved);nextId=orders.length?Math.max(...orders.map(o=>o.id))+1:1}
  else{loadSampleData()}
  
  renderOrders();renderMenus();renderStats();
}

function loadSampleData(){
  const sample=[
    ['高念平','原味椒鹽炸雞霸氣會議餐盒','原片初露青茶','冬天不洗澡也要洗衣服吧'],
    ['游國楷','油蔥舒肥雞霸氣會議餐盒','珍珠大正紅茶拿鐵',''],
    ['謝楷評','招牌椒麻豬排霸氣會議餐盒','桂香青檸粉粿',''],
    ['陳春惠','原味椒鹽炸雞霸氣會議餐盒','桂香青檸粉粿',''],
    ['薛仁奇','油蔥舒肥雞霸氣會議餐盒','桂香青檸粉粿',''],
    ['劉道鈞','爺爺蒲燒魚霸氣會議餐盒','珍珠大正紅茶拿鐵',''],
    ['李佳馨','原味椒鹽炸雞霸氣會議餐盒','桂香青檸粉粿','都AI'],

// Tabs
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='stats')renderStats();
}

// Date
function updateDayOfWeek(){
  const d=document.getElementById('orderDate').value;
  if(d){const days=['日','一','二','三','四','五','六'];document.getElementById('orderDay').value='('+days[new Date(d).getDay()]+')';}
}
document.getElementById('orderDate')?.addEventListener('change',updateDayOfWeek);
function applyDateSetting(){showToast('日期設定已套用','success')}

// Render Orders
function renderOrders(){
  const filtered = getFilteredOrders();
  const total = filtered.length;
  const totalPages = Math.ceil(total/pageSize)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  const start=(currentPage-1)*pageSize;
  const pageData=filtered.slice(start,start+pageSize);
  
  const tbody=document.getElementById('ordersBody');
  if(!pageData.length){tbody.innerHTML='<tr><td colspan="7"><div class="empty-state"><p>沒有符合條件的訂單</p></div></td></tr>';document.getElementById('pagination').innerHTML='';return}
  
  tbody.innerHTML=pageData.map((o,i)=>{
    const isVeg=o.meal&&o.meal.includes('素');
    return `<tr>
      <td>${start+i+1}</td>
      <td><strong>${o.name}</strong></td>
      <td>${o.attend==='OK'?'<span style="color:var(--green)">✓ OK</span>':'<span style="color:var(--text3)">—</span>'}</td>
      <td><span class="tag ${isVeg?'tag-veg':'tag-meal'}">${o.meal||'未選'}</span></td>
      <td><span class="tag tag-drink">${o.drink||'未選'}</span></td>
      <td style="color:var(--text3);max-width:150px;overflow:hidden;text-overflow:ellipsis">${o.remark||''}</td>
      <td><div class="action-group">
        <button class="btn btn-ghost btn-sm" onclick="openModal('edit',${o.id})" title="編輯">✏️</button>
        <button class="btn btn-ghost btn-sm" onclick="confirmDelete(${o.id})" title="刪除" style="color:var(--red)">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
  
  // Pagination
  let phtml='';
  if(totalPages>1){
    phtml+=`<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>&lt;</button>`;
    for(let p=1;p<=totalPages;p++)phtml+=`<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    phtml+=`<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&gt;</button>`;
    phtml+=`<span class="page-info">${total} 筆</span>`;
  }
  document.getElementById('pagination').innerHTML=phtml;
}

function getFilteredOrders(){
  let f=[...orders];
  const s=document.getElementById('searchInput').value.trim();
  const fm=document.getElementById('filterMeal').value;
  const fd=document.getElementById('filterDrink').value;
  if(s)f=f.filter(o=>o.name.includes(s));
  if(fm)f=f.filter(o=>o.meal&&o.meal.includes(fm));
  if(fd)f=f.filter(o=>o.drink&&o.drink.includes(fd));
  return f;
}
function filterOrders(){currentPage=1;renderOrders()}
function goPage(p){const tp=Math.ceil(getFilteredOrders().length/pageSize)||1;if(p>=1&&p<=tp){currentPage=p;renderOrders()}}

// Modal
function openModal(mode,id){
  const overlay=document.getElementById('modalOverlay');
  const title=document.getElementById('modalTitle');
  document.getElementById('orderForm').reset();
  document.getElementById('editId').value='';
  editingId=null;
  
  // Build choices
  const mc=document.getElementById('mealChoices');
  mc.innerHTML=meals.filter(m=>m.active).map(m=>`<label class="radio-card"><input type="radio" name="meal" value="${m.name}"><span>${m.name}</span></label>`).join('');
  const dc=document.getElementById('drinkChoices');
  dc.innerHTML=drinks.filter(d=>d.active).map(d=>`<label class="radio-card"><input type="radio" name="drink" value="${d.name}"><span>${d.name}</span></label>`).join('');
  
  if(mode==='edit'&&id){
    title.textContent='修改訂單';
    document.getElementById('submitBtn').textContent='更新';
    const o=orders.find(x=>x.id===id);
    if(o){
      editingId=id;
      document.getElementById('editId').value=id;
      document.getElementById('empName').value=o.name;
      document.getElementById('empAttend').value=o.attend||'';
      document.getElementById('empRemark').value=o.remark||'';
      const mr=mc.querySelector(`input[value="${o.meal}"]`);if(mr)mr.checked=true;
      const dr=dc.querySelector(`input[value="${o.drink}"]`);if(dr)dr.checked=true;
    }
  }else{title.textContent='新增訂單';document.getElementById('submitBtn').textContent='儲存'}
  overlay.classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

function saveOrder(e){
  e.preventDefault();
  const name=document.getElementById('empName').value.trim();
  const attend=document.getElementById('empAttend').value;
  const mealEl=document.querySelector('input[name="meal"]:checked');
  const drinkEl=document.querySelector('input[name="drink"]:checked');
  const remark=document.getElementById('empRemark').value.trim();
  
  if(!name){showToast('請輸入員工姓名','error');return false}
  
  const data={name,attend,meal:mealEl?mealEl.value:'',drink:drinkEl?drinkEl.value:'',remark};
  
  if(editingId){
    const idx=orders.findIndex(o=>o.id===editingId);
    if(idx>-1){orders[idx]={...orders[idx],...data};showToast('訂單已更新','success')}
  }else{
    orders.push({id:nextId++,...data});
    showToast('訂單已新增','success');
  }
  saveData();renderOrders();renderStats();closeModal();
  return false;
}

// Delete
function confirmDelete(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  document.getElementById('deleteName').textContent=o.name;
  document.getElementById('confirmDeleteBtn').onclick=()=>{
    orders=orders.filter(x=>x.id!==id);
    saveData();renderOrders();renderStats();
    document.getElementById('deleteOverlay').classList.remove('show');
    showToast('訂單已刪除','success');
  };
  document.getElementById('deleteOverlay').classList.add('show');
}

// Menu
function renderMenus(){
  document.getElementById('mealMenuBody').innerHTML=meals.map((m,i)=>`<tr>
    <td>${i+1}</td><td>${m.name}</td><td><span class="tag ${m.type==='素'?'tag-veg':'tag-meal'}">${m.type}</span></td>
    <td>${m.active?'<span style="color:var(--green)">啟用</span>':'<span style="color:var(--red)">停用</span>'}</td>
    <td><div class="action-group">
      <button class="btn btn-ghost btn-sm" onclick="toggleMenuItem('meal',${m.id})">${m.active?'停用':'啟用'}</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteMenuItem('meal',${m.id})">刪除</button>
    </div></td></tr>`).join('');
  
  document.getElementById('drinkMenuBody').innerHTML=drinks.map((d,i)=>`<tr>
    <td>${i+1}</td><td>${d.name}</td><td>${d.sugar||''}</td><td>${d.ice||''}</td>
    <td>${d.active?'<span style="color:var(--green)">啟用</span>':'<span style="color:var(--red)">停用</span>'}</td>
    <td><div class="action-group">
      <button class="btn btn-ghost btn-sm" onclick="toggleMenuItem('drink',${d.id})">${d.active?'停用':'啟用'}</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteMenuItem('drink',${d.id})">刪除</button>
    </div></td></tr>`).join('');
}

function toggleMenuItem(type,id){
  const arr=type==='meal'?meals:drinks;
  const item=arr.find(x=>x.id===id);if(item)item.active=!item.active;
  saveData();renderMenus();
}
function deleteMenuItem(type,id){
  if(type==='meal')meals=meals.filter(x=>x.id!==id);else drinks=drinks.filter(x=>x.id!==id);
  saveData();renderMenus();showToast('已刪除','success');
}
function openMenuModal(type){
  const name=prompt(type==='meal'?'請輸入新主餐名稱：':'請輸入新飲料名稱：');
  if(!name)return;
  const arr=type==='meal'?meals:drinks;
  const nid=arr.length?Math.max(...arr.map(x=>x.id))+1:1;
  if(type==='meal')meals.push({id:nid,name,type:'葷',active:true});
  else drinks.push({id:nid,name,sugar:'正常',ice:'正常',active:true});
  saveData();renderMenus();showToast('已新增','success');
}

// Stats
function renderStats(){
  document.getElementById('statTotal').textContent=orders.length;
  document.getElementById('statAttend').textContent=orders.filter(o=>o.attend==='OK').length;
  document.getElementById('statMeal').textContent=orders.filter(o=>o.meal).length;
  document.getElementById('statDrink').textContent=orders.filter(o=>o.drink).length;
  
  // Meal stats
  const mc={};orders.forEach(o=>{if(o.meal){mc[o.meal]=(mc[o.meal]||0)+1}});
  const maxM=Math.max(...Object.values(mc),1);
  document.getElementById('mealStats').innerHTML=Object.entries(mc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${k}</span><span style="color:var(--accent2);font-weight:700">${v}</span></div>
      <div style="height:6px;background:var(--surface3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${v/maxM*100}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s"></div></div>
    </div>`).join('');
  
  const dc={};orders.forEach(o=>{if(o.drink){dc[o.drink]=(dc[o.drink]||0)+1}});
  const maxD=Math.max(...Object.values(dc),1);
  document.getElementById('drinkStats').innerHTML=Object.entries(dc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${k}</span><span style="color:var(--cyan);font-weight:700">${v}</span></div>
      <div style="height:6px;background:var(--surface3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${v/maxD*100}%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:3px;transition:width .5s"></div></div>
    </div>`).join('');
}

// Export CSV
function exportCSV(){
  let csv='\uFEFF序號,姓名,出席,主餐,飲料,備註\n';
  orders.forEach((o,i)=>{csv+=`${i+1},${o.name},${o.attend},${o.meal},${o.drink},${o.remark}\n`});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`訂餐紀錄_${document.getElementById('orderDate').value}.csv`;a.click();
  showToast('CSV 已匯出','success');
}

// Toast
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast toast-'+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
